<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexShop | Premium Full Stack E-Commerce</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    

    
    <!-- Styling -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <!-- Global Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- App Shell Wrapper -->
    <div id="app-shell" class="app-shell">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="shopping-bag" class="logo-icon"></i>
                    <span>NexShop</span>
                </div>
                <button id="sidebar-close" class="mobile-only-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-links">
                    <li>
                        <a href="#home" class="nav-link active" id="nav-home">
                            <i data-lucide="home"></i>
                            <span>Storefront</span>
                        </a>
                    </li>
                    <li>
                        <a href="#products" class="nav-link" id="nav-products">
                            <i data-lucide="grid"></i>
                            <span>All Products</span>
                        </a>
                    </li>
                    <li class="customer-only hidden">
                        <a href="#orders" class="nav-link" id="nav-orders">
                            <i data-lucide="package"></i>
                            <span>My Orders</span>
                        </a>
                    </li>
                    <li class="customer-only hidden">
                        <a href="#profile" class="nav-link" id="nav-profile">
                            <i data-lucide="user"></i>
                            <span>My Profile</span>
                        </a>
                    </li>
                    
                    <!-- Admin Panel Headers -->
                    <li class="admin-header admin-only hidden">
                        <span class="nav-section-title">Administration</span>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-dashboard" class="nav-link" id="nav-admin-dashboard">
                            <i data-lucide="bar-chart-2"></i>
                            <span>Admin Stats</span>
                        </a>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-products" class="nav-link" id="nav-admin-products">
                            <i data-lucide="boxes"></i>
                            <span>Manage Products</span>
                        </a>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-categories" class="nav-link" id="nav-admin-categories">
                            <i data-lucide="tags"></i>
                            <span>Manage Categories</span>
                        </a>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-orders" class="nav-link" id="nav-admin-orders">
                            <i data-lucide="receipt"></i>
                            <span>Manage Orders</span>
                        </a>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-users" class="nav-link" id="nav-admin-users">
                            <i data-lucide="users"></i>
                            <span>Manage Users</span>
                        </a>
                    </li>
                    <li class="admin-only hidden">
                        <a href="#admin-reviews" class="nav-link" id="nav-admin-reviews">
                            <i data-lucide="message-square"></i>
                            <span>Manage Reviews</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <!-- User card or Auth links -->
                <div id="sidebar-auth-section" class="sidebar-auth-section">
                    <a href="#login" class="btn btn-primary w-full text-center" id="nav-login-btn">
                        <i data-lucide="log-in"></i> Login
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Workspace Shell -->
        <div class="main-shell">
            <!-- Top Navbar Header -->
            <header id="header" class="header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn">
                        <i data-lucide="menu"></i>
                    </button>
                    <!-- Search Input for Catalog -->
                    <div class="header-search-bar" id="header-search-container">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="global-search-input" placeholder="Search products, brands, models...">
                    </div>
                </div>
                
                <div class="header-right">
                    <!-- Light/Dark Mode Switcher -->
                    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
                        <i data-lucide="sun" class="sun-icon hidden"></i>
                        <i data-lucide="moon" class="moon-icon"></i>
                    </button>
                    
                    <!-- Shopping Cart Indicator -->
                    <a href="#cart" class="cart-indicator-btn" id="cart-badge-btn" title="Shopping Cart">
                        <i data-lucide="shopping-cart"></i>
                        <span id="cart-count-badge" class="badge badge-accent hidden">0</span>
                    </a>
                    
                    <!-- Profile Dropdown (visible when logged in) -->
                    <div class="profile-dropdown-container hidden" id="profile-dropdown-container">
                        <button class="profile-avatar-btn" id="profile-avatar-btn">
                            <img id="header-profile-img" src="/uploads/profiles/default-avatar.png" alt="Profile">
                        </button>
                        <div class="profile-dropdown" id="profile-dropdown">
                            <div class="dropdown-header">
                                <span class="user-name" id="dropdown-user-name">User Name</span>
                                <span class="user-role badge" id="dropdown-user-role">Customer</span>
                            </div>
                            <ul class="dropdown-links">
                                <li>
                                    <a href="#profile"><i data-lucide="settings"></i> Account Settings</a>
                                </li>
                                <li>
                                    <a href="#orders"><i data-lucide="clipboard-list"></i> My Orders</a>
                                </li>
                                <li class="divider"></li>
                                <li>
                                    <button id="logout-btn" class="w-full text-left"><i data-lucide="log-out"></i> Logout</button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Viewport Target -->
            <main id="main-content" class="main-content">
                <!-- Javascript will render views inside here -->
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/store.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <!-- Individual View Component Bundles -->
    <script src="/js/components/auth.js"></script>
    <script src="/js/components/shop.js"></script>
    <script src="/js/components/cart.js"></script>
    <script src="/js/components/orders.js"></script>
    <script src="/js/components/admin.js"></script>
    <!-- Application Main Router Initialization -->
    <script src="/js/app.js"></script>
</body>
</html>
